<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aronne Zanichelli | Editing Works</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <meta name="description" content="Video editing and social content portfolio — organised by client and project type." />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800&display=swap" rel="stylesheet" />
    <style>
      .category-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1.25rem;
        margin-top: 0.5rem;
      }
      .category-btn {
        position: relative;
        display: block;
        text-decoration: none;
        border-radius: 16px;
        overflow: hidden;
        border: 2px solid var(--border);
        background: var(--card);
        transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
        cursor: pointer;
      }
      .category-btn:hover, .category-btn:focus-visible {
        border-color: var(--accent);
        transform: translateY(-4px);
        box-shadow: 0 16px 40px rgba(0,0,0,0.4);
      }
      .category-btn--disabled { cursor: default; opacity: 0.7; }
      .category-btn--disabled:hover, .category-btn--disabled:focus-visible {
        transform: none; box-shadow: none; border-color: var(--border);
      }
      .category-img-wrap {
        position: relative;
        aspect-ratio: 16 / 9;
        overflow: hidden;
        background: var(--border);
      }
      .category-img-wrap img {
        width: 100%; height: 100%; object-fit: cover; display: block;
        transition: transform 0.3s ease;
      }
      .category-btn:hover .category-img-wrap img { transform: scale(1.04); }
      .category-btn--disabled:hover .category-img-wrap img { transform: none; }
      .category-img-wrap::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.6) 100%);
        pointer-events: none;
      }
      .coming-soon-overlay {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: rgba(11,15,20,0.55); z-index: 2; pointer-events: none;
      }
      .coming-soon-pill {
        background: rgba(11,15,20,0.82);
        border: 1.5px solid var(--border);
        border-radius: 99px;
        padding: 0.35rem 0.9rem;
        font-size: 0.72rem; font-weight: 800;
        text-transform: uppercase; letter-spacing: 0.08em;
        color: var(--muted);
      }
      .category-info { padding: 0.9rem 1rem 1rem; }
      .category-info-top {
        display: flex; align-items: flex-start;
        justify-content: space-between; gap: 0.5rem; margin-bottom: 0.35rem;
      }
      .category-name { font-size: 1.05rem; font-weight: 800; color: var(--text); margin: 0; }
      .category-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.5; margin: 0; }
      .category-arrow {
        font-size: 1.2rem; color: var(--accent); flex-shrink: 0;
        margin-top: 1px; transition: transform 0.2s;
      }
      .category-btn:hover .category-arrow { transform: translateX(3px); }
      @media (max-width: 900px) { .category-grid { grid-template-columns: 1fr 1fr; } }
      @media (max-width: 560px) { .category-grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <script>(function(){if(localStorage.getItem('theme')==='light')document.body.classList.add('light');})();</script>
    <a class="skip-link" href="#mainContent">Skip to main content</a>

    <header class="site-header">
      <nav class="nav container" aria-label="Main navigation">
        <a class="brand" href="index.html">Aronne Zanichelli</a>
        <button id="menuToggle" class="menu-toggle" aria-label="Toggle menu" aria-expanded="false">☰</button>
        <ul id="navMenu" class="nav-menu">
          <li><a href="index.html" data-i18n="nav.home"></a></li>
          <li><a href="editing.html" data-i18n="nav.editing"></a></li>
          <li><a href="featured.html" data-i18n="nav.featured"></a></li>
        </ul>
        <div class="top-controls">
          <button class="lang-btn" data-lang="en" aria-label="Switch language to English" aria-pressed="false">EN</button>
          <span>|</span>
          <button class="lang-btn" data-lang="it" aria-label="Cambia lingua in Italiano" aria-pressed="false">IT</button>
          <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme" aria-pressed="false">☾</button>
        </div>
      </nav>
    </header>

    <main id="mainContent" class="container" style="margin-top:1rem;">

      <section class="card fade-in">
        <h1 data-i18n="edit.pageTitle"></h1>
        <p data-i18n="edit.pageIntro"></p>
      </section>

      <div class="category-grid">

        <a href="labelbike.html" class="category-btn fade-in">
          <div class="category-img-wrap">
            <img src="https://img.youtube.com/vi/BirILFe52Ik/hqdefault.jpg"
                 alt="Labelbike thumbnail" loading="lazy" />
          </div>
          <div class="category-info">
            <div class="category-info-top">
              <h2 class="category-name">Labelbike</h2>
              <span class="badge badge--wip" data-i18n="edit.lb.status"></span>
              <span class="category-arrow">→</span>
            </div>
            <p class="category-desc" data-i18n="edit.lb.cardDesc"></p>
          </div>
        </a>

        <div class="category-btn category-btn--disabled" tabindex="0">
          <div class="category-img-wrap">
            <img src="assets/placeholder-freelance.jpg" alt="" loading="lazy" />
            <div class="coming-soon-overlay">
              <span class="coming-soon-pill" data-i18n="edit.comingSoon"></span>
            </div>
          </div>
          <div class="category-info">
            <div class="category-info-top">
              <h2 class="category-name" data-i18n="edit.freelanceTitle"></h2>
              <span class="badge badge--soon" data-i18n="edit.comingSoon"></span>
            </div>
            <p class="category-desc" data-i18n="edit.freelanceDesc"></p>
          </div>
        </div>

        <div class="category-btn category-btn--disabled" tabindex="0">
          <div class="category-img-wrap">
            <img src="assets/placeholder-personal.jpg" alt="" loading="lazy" />
            <div class="coming-soon-overlay">
              <span class="coming-soon-pill" data-i18n="edit.comingSoon"></span>
            </div>
          </div>
          <div class="category-info">
            <div class="category-info-top">
              <h2 class="category-name" data-i18n="edit.personalTitle"></h2>
              <span class="badge badge--soon" data-i18n="edit.comingSoon"></span>
            </div>
            <p class="category-desc" data-i18n="edit.personalDesc"></p>
          </div>
        </div>

      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-content">
        <p>© <span id="year"></span> Aronne Zanichelli</p>
        <p data-i18n="footer.language"></p>
      </div>
    </footer>

    <script src="script.js" defer></script>
  </body>
</html>
