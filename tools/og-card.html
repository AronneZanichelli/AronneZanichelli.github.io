<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>og-card 1200×630</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@800&family=Inter:wght@400&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <style>
    /* Rigenerazione: vedi README §OG card. Token allineati a style.css :root (dark). */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1200px; height: 630px; overflow: hidden; }
    body {
      background: #1A1A1A;
      position: relative;
      font-family: 'Inter', sans-serif;
    }
    /* dot-field + griglia vermiglio mascherata, al posto della rain */
    .grid-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(rgba(245, 242, 237, 0.05) 1px, transparent 1px) 0 0 / 22px 22px,
        linear-gradient(rgba(232, 57, 14, 0.06) 1px, transparent 1px) 0 0 / 56px 56px,
        linear-gradient(90deg, rgba(232, 57, 14, 0.06) 1px, transparent 1px) 0 0 / 56px 56px;
      -webkit-mask-image: radial-gradient(ellipse 85% 80% at 70% 45%, #000 30%, transparent 85%);
              mask-image: radial-gradient(ellipse 85% 80% at 70% 45%, #000 30%, transparent 85%);
      z-index: 1;
    }
    .orb { position: absolute; border-radius: 999px; filter: blur(70px); z-index: 1; }
    .orb--a { width: 380px; height: 380px; background: #E8390E; opacity: 0.30; right: -90px; top: -60px; }
    .orb--b { width: 300px; height: 300px; background: #C0922A; opacity: 0.22; right: 140px; bottom: -120px; }
    .topbar {
      position: absolute; top: 0; left: 0; width: 100%; height: 6px;
      background: linear-gradient(90deg, #E8390E, #C0922A);
      z-index: 3;
    }
    .content {
      position: absolute; left: 72px; top: 0; height: 100%;
      display: flex; flex-direction: column; justify-content: center;
      z-index: 2;
    }
    .eyebrow {
      font-family: 'JetBrains Mono', monospace; font-weight: 500;
      font-size: 26px; color: #FFA184; letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }
    h1 {
      position: relative;
      font-family: 'Space Grotesk', sans-serif; font-weight: 800;
      font-size: 96px; line-height: 1.02; letter-spacing: -0.03em;
      color: #F5F2ED;
      max-width: 820px;
      text-shadow: 0 0 40px rgba(232, 57, 14, 0.18);
    }
    /* glitch congelato: due copie sfalsate vermiglio/oro */
    h1::before, h1::after {
      content: attr(data-text);
      position: absolute; inset: 0;
      mix-blend-mode: screen; opacity: 0.85;
      text-shadow: none;
    }
    h1::before { color: #E8390E; transform: translate(3px, 0); clip-path: polygon(0 0, 100% 0, 100% 33%, 0 33%); }
    h1::after  { color: #C0922A; transform: translate(-3px, 0); clip-path: polygon(0 67%, 100% 67%, 100% 100%, 0 100%); }
    .tagline { font-size: 34px; color: #E0DCD3; margin-top: 30px; }
    .tagline .ai { color: #FFA184; }
    .tagline .design { color: #E5B752; }
    .tagline .code { color: #F5F2ED; }
    .url {
      position: absolute; left: 72px; bottom: 56px;
      font-family: 'JetBrains Mono', monospace; font-weight: 500;
      font-size: 24px; color: #E5B752; z-index: 2;
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="orb orb--a"></div>
  <div class="orb orb--b"></div>
  <div class="topbar"></div>
  <div class="content">
    <div class="eyebrow">junior software developer (AI-augmented)</div>
    <h1 data-text="Aronne Zanichelli">Aronne Zanichelli</h1>
    <div class="tagline">Merging <span class="ai">AI</span>, <span class="design">Design</span> &amp; <span class="code">Code</span>.</div>
  </div>
  <div class="url">aronnezanichelli.github.io</div>
</body>
</html>
